name: PhoneCam
options:
  bundleIdPrefix: com.phonecam.app
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  PhoneCam:
    type: application
    platform: iOS
    sources:
      - path: Sources/PhoneCam
    info:
      path: Sources/PhoneCam/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities: [armv7]
        NSCameraUsageDescription: "PhoneCam braucht Zugriff auf die Kamera, um das Bild als PC-Webcam zu streamen."
        NSPhotoLibraryUsageDescription: "PhoneCam braucht Zugriff auf deine Fotos, um ein Bild als Standbild senden zu können."
        NSLocalNetworkUsageDescription: "PhoneCam muss sich im lokalen WLAN mit deinem PC verbinden, um das Kamerabild zu senden."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.phonecam.app
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
